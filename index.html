<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PCA Workshop AI v0.4</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>PCA Workshop AI</h1>
      <p>Workshop Control Centre v0.4</p>
    </div>
  </header>

  <main class="container">
    <nav class="tabs">
      <button class="tab-button active" data-tab="manager">Service Manager</button>
      <button class="tab-button" data-tab="technician">Technician</button>
      <button class="tab-button" data-tab="dashboard">Dashboard</button>
    </nav>

    <section id="manager" class="tab-panel active">
      <div class="card">
        <h2>New Job</h2>

        <div class="grid">
          <label>Registration *<input id="jobReg" placeholder="AB19 XYZ" /></label>
          <label>Customer Name<input id="customerName" placeholder="Customer name" /></label>
          <label>Telephone<input id="customerPhone" placeholder="Telephone number" /></label>
          <label>Vehicle Make<input id="vehicleMake" placeholder="Ford / Audi / VW" /></label>
          <label>Vehicle Model<input id="vehicleModel" placeholder="Fiesta / A4 / Golf" /></label>
          <label>Mileage<input id="mileage" type="number" placeholder="Mileage" /></label>

          <label>Job Type *
            <select id="jobType">
              <option>Retail</option>
              <option>Warranty</option>
              <option>Internal</option>
            </select>
          </label>

          <label>Assigned Technician *
            <select id="assignedTech">
              <option>Jake</option>
              <option>Gordon</option>
              <option>James</option>
              <option>Jimmy</option>
              <option>Ross</option>
              <option>Other</option>
            </select>
          </label>

          <label id="otherTechWrap" class="hidden">Other Technician<input id="otherTechName" placeholder="Technician name" /></label>
          <label>Labour Hours Allowed *<input id="labourHours" type="number" min="0" step="0.25" placeholder="2.5" /></label>

          <label>Priority
            <select id="priority">
              <option>🟢 Routine</option>
              <option>🟠 Today</option>
              <option>🔴 Urgent</option>
            </select>
          </label>

          <label>MOT Add-on
            <select id="motOption">
              <option>None</option>
              <option>Full MOT</option>
              <option>Retest</option>
              <option>Pre-MOT Check</option>
            </select>
          </label>

          <label id="authWrap">Customer Authorisation
            <select id="authorisation">
              <option>Awaiting Customer Approval</option>
              <option>Approved</option>
              <option>Declined</option>
            </select>
          </label>
        </div>

        <label>Work Required
          <textarea id="workRequired" placeholder="Example: Customer reports vibration under braking. Diagnose and advise."></textarea>
        </label>

        <button id="addJob" class="primary">Assign Job</button>
      </div>

      <div class="card">
        <h2>Today's Jobs</h2>
        <div id="managerJobs" class="job-list empty">No jobs loaded yet.</div>
      </div>
    </section>

    <section id="technician" class="tab-panel">
      <div class="card">
        <h2>Technician Jobs</h2>
        <label>Select Technician
          <select id="techFilter">
            <option>Jake</option>
            <option>Gordon</option>
            <option>James</option>
            <option>Jimmy</option>
            <option>Ross</option>
            <option>Other</option>
            <option>All</option>
          </select>
        </label>
        <div id="techJobs" class="job-list empty">No jobs assigned.</div>
      </div>

      <div id="jobWorkArea" class="card hidden">
        <h2 id="activeJobTitle">Job</h2>
        <p id="activeJobMeta" class="muted"></p>

        <label>Job Status
          <select id="activeStatus">
            <option>🔵 Waiting to Start</option>
            <option>🟡 Diagnosis</option>
            <option>🟠 Awaiting Parts</option>
            <option>🟣 Awaiting Customer Approval</option>
            <option>🟢 Repair Complete</option>
            <option>✅ Ready for Collection</option>
          </select>
        </label>

        <label>Technician Voice Note / Findings
          <textarea id="techNote" placeholder="Speak or type: complaint, findings, repair completed, parts used, advisories."></textarea>
        </label>

        <div class="button-row">
          <button id="startVoice" class="secondary">🎤 Start Voice</button>
          <button id="stopVoice" class="secondary">⏹ Stop</button>
        </div>

        <button id="saveJobUpdate" class="primary">Save Job Update</button>
      </div>
    </section>

    <section id="dashboard" class="tab-panel">
      <div class="card">
        <h2>Workshop Dashboard</h2>
        <div id="stats" class="stats-grid"></div>
      </div>

      <div class="card">
        <h2>Technician Workload</h2>
        <div id="workload" class="job-list empty">No workload yet.</div>
      </div>

      <div class="card">
        <h2>Workshop Board</h2>
        <div id="dashboardJobs" class="job-list empty">No jobs loaded yet.</div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
